                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = usuarioLogado.nome;
                document.getElementById('user-role').innerText = usuarioLogado.cargo;
                renderAlunos();
                renderLogs();
            } else { error.classList.remove('hidden'); }
        }

        function handleLogout() { location.reload(); }

        // --- INTERFACE ---
        function showTab(tab) {
            document.getElementById('tab-painel').classList.toggle('hidden', tab !== 'painel');
            document.getElementById('tab-logs').classList.toggle('hidden', tab !== 'logs');
            document.getElementById('btn-tab-painel').classList.toggle('tab-active', tab === 'painel');
            document.getElementById('btn-tab-logs').classList.toggle('tab-active', tab === 'logs');
        }

        function filterPelotao(pel) {
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(b => b.classList.remove('filter-btn-active'));
            event.target.classList.add('filter-btn-active');
            renderAlunos(pel);
        }

        // --- RENDERIZAÇÃO ---
        function renderAlunos(filtro = 'TODOS') {
            const body = document.getElementById('lista-alunos-body');
            body.innerHTML = '';
            const filtrados = filtro === 'TODOS' ? dadosAlunos : dadosAlunos.filter(a => a.pelotao === filtro);

            filtrados.forEach(aluno => {
                const podeEditar = (usuarioLogado.acesso === "TODOS" || usuarioLogado.acesso === aluno.pelotao);
                const total = (aluno.l1_qtd + aluno.l2_qtd) * 400;
                
                const row = document.createElement('tr');
                row.className = `border-b transition-colors ${!podeEditar ? 'bg-gray-50 opacity-80' : 'hover:bg-blue-50'}`;
                row.innerHTML = `
                    <td class="p-4">
                        <div class="flex items-center gap-2">
                            ${!podeEditar ? '🔒' : ''}
                            <div>
                                <div class="font-bold text-slate-800 text-sm">${aluno.id} - ${aluno.nome}</div>
                                <div class="text-[10px] text-gray-400 font-mono">${aluno.pelotao}</div>
                            </div>
                        </div>
                    </td>
                    <td class="p-4 text-center">
                        <select ${!podeEditar ? 'disabled' : ''} onchange="updateData(${aluno.id}, 'l1_qtd', this.value)" class="text-xs border rounded p-1">
                            <option value="0" ${aluno.l1_qtd == 0 ? 'selected' : ''}>0</option>
                            <option value="1" ${aluno.l1_qtd == 1 ? 'selected' : ''}>1</option>
                            <option value="2" ${aluno.l1_qtd == 2 ? 'selected' : ''}>2</option>
                        </select>
                        <button ${!podeEditar ? 'disabled' : ''} onclick="updateData(${aluno.id}, 'l1_pago', ${!aluno.l1_pago})" 
                            class="block mx-auto mt-1 text-[9px] px-2 py-0.5 rounded-full font-bold border ${aluno.l1_pago ? 'bg-green-600 text-white' : 'bg-white text-orange-500 border-orange-500'}">
                            ${aluno.l1_pago ? 'PAGO' : 'PENDENTE'}
                        </button>
                    </td>
                    <td class="p-4 text-center">
                        <select ${!podeEditar ? 'disabled' : ''} onchange="updateData(${aluno.id}, 'l2_qtd', this.value)" class="text-xs border rounded p-1">
                            <option value="0" ${aluno.l2_qtd == 0 ? 'selected' : ''}>0</option>
                            <option value="1" ${aluno.l2_qtd == 1 ? 'selected' : ''}>1</option>
                        </select>
                        <button ${!podeEditar ? 'disabled' : ''} onclick="updateData(${aluno.id}, 'l2_pago', ${!aluno.l2_pago})" 
                            class="block mx-auto mt-1 text-[9px] px-2 py-0.5 rounded-full font-bold border ${aluno.l2_pago ? 'bg-green-600 text-white' : 'bg-white text-orange-500 border-orange-500'}">
                            ${aluno.l2_pago ? 'PAGO' : 'PENDENTE'}
                        </button>
                    </td>
                    <td class="p-4 font-bold text-slate-700">R$ ${total}</td>
                    <td class="p-4 text-center">
                        <span class="text-[10px] px-2 py-1 rounded ${aluno.l1_pago && (aluno.l2_qtd == 0 || aluno.l2_pago) ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'} font-bold">
                            ${aluno.l1_pago && (aluno.l2_qtd == 0 || aluno.l2_pago) ? 'FINALIZADO' : 'EM ABERTO'}
                        </span>
                    </td>
                `;
                body.appendChild(row);
            });
        }

        // --- ATUALIZAÇÃO ---
        function updateData(alunoId, campo, valor) {
            const index = dadosAlunos.findIndex(a => a.id === alunoId);
            const aluno = dadosAlunos[index];

            // Proteção extra contra manipulação via console
            if (usuarioLogado.acesso !== "TODOS" && usuarioLogado.acesso !== aluno.pelotao) {
                alert("Permissão negada para este pelotão.");
                return;
            }

            const antigo = aluno[campo];
            const novoValor = (campo.includes('qtd')) ? parseInt(valor) : valor;
            if (antigo === novoValor) return;

            dadosAlunos[index][campo] = novoValor;
            
            logs.push({
                data: new Date().toLocaleString('pt-BR'),
                autor: usuarioLogado.nome,
                aluno: aluno.nome,
                detalhe: `${campo}: ${antigo} ➔ ${novoValor}`
            });

            localStorage.setItem('comasp_v3_alunos', JSON.stringify(dadosAlunos));
            localStorage.setItem('comasp_v3_logs', JSON.stringify(logs));
            renderAlunos(document.querySelector('.filter-btn-active').innerText === 'Todos' ? 'TODOS' : document.querySelector('.filter-btn-active').innerText + '/2ª CIA');
            renderLogs();
        }

        function renderLogs() {
            const container = document.getElementById('logs-container');
            container.innerHTML = logs.length === 0 ? '<p class="text-gray-400">Sem histórico.</p>' : '';
            logs.slice().reverse().forEach(log => {
                const item = document.createElement('div');
                item.className = "text-[10px] p-2 border-l-2 border-blue-800 bg-white mb-1 shadow-sm flex gap-3";
                item.innerHTML = `<span class="text-gray-400">${log.data}</span> <span class="font-bold text-blue-900 w-24">${log.autor}</span> <span>Modificou <b>${log.aluno}</b>: ${log.detalhe}</span>`;
                container.appendChild(item);
            });
        }
    </script>
</body>
</html>
