<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMASP T2 - Sistema de Auditoria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .tab-active {
            border-bottom: 4px solid #1d4ed8;
            color: #1d4ed8;
            font-weight: 800;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">

    <div id="login-screen" class="fixed inset-0 bg-slate-950 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border-t-8 border-blue-700">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black text-slate-800 tracking-tighter uppercase">COMASP T2</h1>
                <p class="text-slate-500 font-medium">Controle de Senhas Extras</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="login-cpf"
                    class="w-full p-4 border-2 border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition font-semibold"
                    placeholder="CPF (apenas números)">
                <input type="password" id="login-pass"
                    class="w-full p-4 border-2 border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition font-semibold"
                    placeholder="Senha">
                <button onclick="handleLogin()" id="btn-entrar"
                    class="w-full bg-blue-700 text-white font-black py-4 rounded-2xl hover:bg-blue-800 transition shadow-lg active:scale-95 uppercase">Entrar</button>
            </div>
            <p id="login-error" class="text-red-600 text-sm font-bold text-center mt-5 hidden italic">Acesso negado.
                Verifique os dados.</p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header class="bg-white border-b sticky top-0 z-40 shadow-sm">
            <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
                <span class="font-black text-xl text-slate-900 uppercase">COMASP <span
                        class="text-blue-700">T2</span></span>
                <nav class="flex h-full items-center">
                    <button onclick="switchTab('dash')" id="btn-dash"
                        class="px-6 h-full tab-active uppercase text-xs font-bold tracking-widest">Painel</button>
                    <button onclick="switchTab('logs')" id="btn-logs"
                        class="px-6 h-full text-slate-500 uppercase text-xs font-bold tracking-widest">Logs</button>
                </nav>
                <div class="text-right">
                    <span id="user-display"
                        class="font-black text-blue-700 text-[10px] bg-blue-50 px-3 py-1 rounded-full uppercase">--</span>
                    <button onclick="location.reload()"
                        class="text-[10px] text-red-500 font-bold block mt-1 hover:underline">SAIR</button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6">
            <div id="tab-dash" class="space-y-6">
                <div
                    class="bg-white p-6 rounded-3xl shadow border flex flex-col md:flex-row justify-between items-center gap-4">
                    <p class="text-sm font-medium text-slate-500 italic">Cada senha extra: <b class="text-green-700">R$
                            400,00</b></p>
                    <input type="text" id="search" onkeyup="filterAlunos()" placeholder="Buscar aluno..."
                        class="w-full md:w-80 px-6 py-3 bg-slate-100 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-medium text-sm">
                </div>

                <div class="bg-white rounded-3xl shadow-xl border overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 border-b text-[10px] font-black uppercase text-slate-400">
                                <tr>
                                    <th class="p-6">Nº</th>
                                    <th class="p-6">Aluno</th>
                                    <th class="p-6 text-center">Senhas</th>
                                    <th class="p-6">Total</th>
                                    <th class="p-6">Status</th>
                                    <th class="p-6 text-right">Ação</th>
                                </tr>
                            </thead>
                            <tbody id="aluno-table-body" class="divide-y divide-slate-100 text-sm font-semibold">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="tab-logs" class="hidden space-y-6">
                <h2 class="text-xl font-black text-slate-900">Histórico de Auditoria</h2>
                <div id="logs-list"
                    class="bg-white rounded-3xl shadow border divide-y divide-slate-50 max-h-[70vh] overflow-y-auto">
                </div>
            </div>
        </main>
    </div>

    <div id="modal"
        class="fixed inset-0 bg-slate-950/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm border-t-8 border-blue-700 p-8">
            <h4 id="modal-aluno-nome" class="text-xl font-black mb-6 uppercase text-slate-800">--</h4>
            <div class="space-y-6">
                <input type="hidden" id="modal-aluno-id">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Qtd de Senhas
                        Extras</label>
                    <input type="number" id="modal-senhas"
                        class="w-full p-4 bg-slate-100 rounded-2xl text-2xl font-black outline-none border-2 border-transparent focus:border-blue-500 text-center">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Status do
                        Pagamento</label>
                    <select id="modal-status"
                        class="w-full p-4 bg-slate-100 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-blue-500">
                        <option value="false">🔴 PENDENTE</option>
                        <option value="true">🟢 PAGO / OK</option>
                    </select>
                </div>
                <div class="flex gap-4 pt-4">
                    <button onclick="closeModal()"
                        class="flex-1 py-4 text-slate-400 font-bold hover:bg-slate-50 rounded-2xl transition">CANCELAR</button>
                    <button onclick="saveChanges()"
                        class="flex-1 py-4 bg-blue-700 text-white font-black rounded-2xl shadow-lg">SALVAR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://iogtissohqhgxiskzgvc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvZ3Rpc3NvaHFoZ3hpc2t6Z3ZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI1MDAwNTEsImV4cCI6MjA3ODA3NjA1MX0.4Fj05iwaUNDpdDaAch-dGp5TUtcumV72uzpIovQeCbg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let tesoureiroLogado = null;

        async function handleLogin() {
            const cpf = document.getElementById('login-cpf').value.replace(/\D/g, "");
            const pass = document.getElementById('login-pass').value;
            const { data } = await _supabase.from('tesoureiros').select('nome').eq('cpf', cpf).eq('senha', pass).single();

            if (data) {
                tesoureiroLogado = data.nome;
                document.getElementById('user-display').innerText = data.nome;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                loadAlunos();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        async function loadAlunos() {
            const { data: alunos } = await _supabase.from('alunos').select('*').order('id', { ascending: true });
            document.getElementById('aluno-table-body').innerHTML = alunos.map(a => `
                <tr class="hover:bg-slate-50 border-l-4 ${a.pago ? 'border-l-emerald-500' : 'border-l-rose-500'}">
                    <td class="p-6 text-slate-400 font-black">${a.id}</td>
                    <td class="p-6 uppercase text-slate-700">${a.nome_guerra}</td>
                    <td class="p-6 text-center font-black">${a.senhas_extras}</td>
                    <td class="p-6 font-black text-blue-700">R$ ${a.senhas_extras * 400}</td>
                    <td class="p-6">
                        <span class="px-2.5 py-1 rounded-md text-[10px] font-black ${a.pago ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}">
                            ${a.pago ? 'PAGO' : 'PENDENTE'}
                        </span>
                    </td>
                    <td class="p-6 text-right">
                        <button onclick="openModal(${a.id}, '${a.nome_guerra}', ${a.senhas_extras}, ${a.pago})" class="bg-white border-2 border-slate-900 px-4 py-1.5 rounded-xl text-[10px] font-black uppercase hover:bg-slate-900 hover:text-white transition">Editar</button>
                    </td>
                </tr>
            `).join('');
        }

        function openModal(id, nome, senhas, pago) {
            document.getElementById('modal-aluno-id').value = id;
            document.getElementById('modal-aluno-nome').innerText = nome;
            document.getElementById('modal-senhas').value = senhas;
            document.getElementById('modal-status').value = pago.toString();
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function saveChanges() {
            const id = document.getElementById('modal-aluno-id').value;
            const nome = document.getElementById('modal-aluno-nome').innerText;
            const novasSenhas = parseInt(document.getElementById('modal-senhas').value) || 0;
            const novoStatus = document.getElementById('modal-status').value === "true";

            const { data: antigo } = await _supabase.from('alunos').select('*').eq('id', id).single();
            await _supabase.from('alunos').update({ senhas_extras: novasSenhas, pago: novoStatus }).eq('id', id);
            await _supabase.from('logs').insert({
                nome_tesoureiro: tesoureiroLogado,
                nome_aluno: nome,
                detalhes: `Senhas: ${antigo.senhas_extras}→${novasSenhas} | Pago: ${antigo.pago}→${novoStatus}`
            });

            closeModal();
            loadAlunos();
        }

        async function loadLogs() {
            const { data: logs } = await _supabase.from('logs').select('*').order('data_hora', { ascending: false });
            document.getElementById('logs-list').innerHTML = logs.map(l => `
                <div class="p-4 hover:bg-slate-50 transition">
                    <div class="flex justify-between text-[9px] font-black text-slate-400 uppercase mb-1">
                        <span>${new Date(l.data_hora).toLocaleString()}</span>
                        <span class="text-blue-600 italic">Por: ${l.nome_tesoureiro}</span>
                    </div>
                    <p class="text-xs font-bold text-slate-700 uppercase">Alterou <span class="text-black underline">${l.nome_aluno}</span>: <span class="bg-blue-50 text-blue-700 px-2 rounded">${l.detalhes}</span></p>
                </div>
            `).join('');
        }

        function filterAlunos() {
            const q = document.getElementById('search').value.toUpperCase();
            const rows = document.getElementById('aluno-table-body').getElementsByTagName('tr');
            for (let row of rows) { row.style.display = row.innerText.toUpperCase().includes(q) ? "" : "none"; }
        }

        function switchTab(tab) {
            const isDash = tab === 'dash';
            document.getElementById('tab-dash').classList.toggle('hidden', !isDash);
            document.getElementById('tab-logs').classList.toggle('hidden', isDash);
            document.getElementById('btn-dash').className = isDash ? 'px-6 h-full tab-active uppercase text-xs font-bold tracking-widest' : 'px-6 h-full text-slate-500 uppercase text-xs font-bold tracking-widest';
            document.getElementById('btn-logs').className = !isDash ? 'px-6 h-full tab-active uppercase text-xs font-bold tracking-widest' : 'px-6 h-full text-slate-500 uppercase text-xs font-bold tracking-widest';
            if (!isDash) loadLogs();
        }
    </script>
</body>

</html>
