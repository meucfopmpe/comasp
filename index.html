<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMASP T2 - Sistema Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tab-active { border-bottom: 3px solid #1e40af; color: #1e40af; font-weight: bold; }
        .hidden { display: none; }
        .filter-btn-active { background-color: #1e40af !important; color: white !important; }
        
        @media print {
            body { background: white !important; }
            #main-app, #login-screen, nav, header { display: none !important; }
            #print-area { display: block !important; position: absolute; left: 0; top: 0; width: 100%; padding: 20px; }
            table { width: 100%; border-collapse: collapse; margin-top: 15px; }
            th, td { border: 1px solid #000; padding: 6px; text-align: left; font-size: 10px; }
            th { background: #eee !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <div id="print-area" class="hidden">
        <h1 id="print-title" class="text-xl font-bold text-center">COMASP T2 - RELATÓRIO DE SENHAS</h1>
        <p id="print-subtitle" class="text-center text-xs mb-4"></p>
        <table>
            <thead>
                <tr>
                    <th>Nº / ALUNO</th>
                    <th>PELOTÃO</th>
                    <th>L1 (QTD/PG)</th>
                    <th>L2 (QTD/PG)</th>
                    <th>TOTAL PAGO</th>
                </tr>
            </thead>
            <tbody id="print-tbody"></tbody>
        </table>
    </div>

    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-slate-900 px-4">
        <div class="bg-white p-8 rounded-lg shadow-2xl w-full max-w-md">
            <h1 class="text-2xl font-bold mb-6 text-center text-slate-800">COMASP <span class="text-blue-600 font-black">T2</span></h1>
            <div class="space-y-4">
                <input type="text" id="login-cpf" class="w-full p-2 border rounded" placeholder="CPF (Apenas números)">
                <input type="password" id="login-pass" class="w-full p-2 border rounded" placeholder="Senha">
                <button onclick="handleLogin()" id="btn-entrar" class="w-full bg-blue-700 text-white py-2 rounded font-bold hover:bg-blue-800 transition">Entrar</button>
            </div>
            <p id="login-error" class="text-red-500 text-xs mt-4 text-center hidden font-bold"></p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="bg-white shadow p-4 flex flex-col md:flex-row justify-between items-center border-b-2 border-blue-800 gap-4">
            <div class="flex items-center gap-4">
                <h2 class="text-xl font-bold uppercase">Gestão <span class="text-blue-600">T2</span></h2>
                <div class="border-l-2 pl-4 hidden md:block">
                    <span id="user-display" class="block text-sm font-bold text-slate-700"></span>
                    <span id="user-role" class="block text-[10px] text-blue-600 uppercase font-black"></span>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="bg-slate-50 border rounded px-3 py-1 text-right">
                    <div class="text-[10px] uppercase font-bold text-gray-400">Total Arrecadado (Geral)</div>
                    <div id="total-geral" class="text-lg font-black text-blue-800">R$ 0,00</div>
                </div>
                <button onclick="gerarRelatorio()" class="bg-blue-600 text-white px-3 py-2 rounded font-bold text-xs hover:bg-blue-700 shadow-sm flex items-center gap-2">
                    🖨️ Imprimir
                </button>
                <button onclick="handleLogout()" class="text-xs bg-red-50 text-red-600 px-3 py-2 rounded font-bold">Sair</button>
            </div>
        </header>

        <div class="md:hidden bg-slate-100 text-center py-1 text-xs border-b">
            Logado como: <span id="user-display-mobile" class="font-bold"></span>
        </div>

        <nav class="flex bg-white shadow-sm px-4 sticky top-0 z-10 border-b">
            <button onclick="showTab('painel')" id="btn-tab-painel" class="p-4 tab-active">Alunos</button>
            <button onclick="showTab('logs')" id="btn-tab-logs" class="p-4">Auditoria (Logs)</button>
        </nav>

        <main class="p-4">
            <div id="tab-painel">
                <div class="mb-4 bg-blue-50 border border-blue-200 p-3 rounded flex justify-between items-center">
                    <div>
                        <span class="text-xs font-bold text-blue-800 uppercase" id="label-total-pelotao">Exibindo: Todos</span>
                    </div>
                    <div class="text-blue-900 font-bold">
                        Arrecadado no Filtro: <span id="valor-filtro" class="text-xl">R$ 0,00</span>
                    </div>
                </div>

                <div class="mb-4 flex flex-wrap gap-2" id="filter-container"></div>
                
                <div class="bg-white rounded shadow overflow-x-auto border border-gray-200">
                    <table class="w-full text-left border-collapse min-w-[900px]">
                        <thead class="bg-slate-100 border-b text-[11px] font-bold uppercase text-gray-500">
                            <tr><th class="p-4">Nº / Nome</th><th class="p-4 text-center">Lote 1 (Max 2)</th><th class="p-4 text-center">Lote 2 (Max 1)</th><th class="p-4">Total</th><th class="p-4 text-center">Ação</th></tr>
                        </thead>
                        <tbody id="lista-alunos-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-logs" class="hidden">
                <div id="sync-banner" class="mb-4 bg-orange-100 border border-orange-300 p-3 rounded text-sm hidden">
                    ⚠️ Encontramos logs antigos neste computador. <button onclick="migrarLogsLocais()" class="font-bold underline text-orange-800">Clique aqui para salvar no banco de dados.</button>
                </div>
                <div class="bg-white rounded shadow p-4 max-w-5xl mx-auto space-y-1" id="logs-container"></div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = "https://iogtissohqhgxiskzgvc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvZ3Rpc3NvaHFoZ3hpc2t6Z3ZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI1MDAwNTEsImV4cCI6MjA3ODA3NjA1MX0.4Fj05iwaUNDpdDaAch-dGp5TUtcumV72uzpIovQeCbg";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let usuarioLogado = null;
        let alunosDB = [];
        let filtroAtivo = 'TODOS';

        async function getDeviceInfo() {
            let ip = 'Não detectado';
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
            } catch(e) { console.log("Erro ao buscar IP", e); }

            let deviceId = localStorage.getItem('comasp_device_id');
            if (!deviceId) {
                deviceId = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase() + '-' + Date.now();
                localStorage.setItem('comasp_device_id', deviceId);
            }

            return { ip, deviceId, userAgent: navigator.userAgent };
        }

        async function handleLogin() {
            const cpf = document.getElementById('login-cpf').value.replace(/\D/g, "");
            const pass = document.getElementById('login-pass').value;
            const btn = document.getElementById('btn-entrar');
            const errorEl = document.getElementById('login-error');
            
            btn.disabled = true; btn.innerText = "Entrando...";

            const { data, error } = await _supabase.from('perfis_tesoureiros').select('*').eq('cpf', cpf).eq('senha', pass).single();

            if (error || !data) {
                errorEl.innerText = "Acesso Negado: CPF ou Senha incorretos.";
                errorEl.classList.remove('hidden');
                btn.disabled = false; btn.innerText = "Entrar";
            } else {
                usuarioLogado = data;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                
                document.getElementById('user-display').innerText = usuarioLogado.nome;
                document.getElementById('user-role').innerText = usuarioLogado.cargo;
                document.getElementById('user-display-mobile').innerText = usuarioLogado.nome;

                // Captura info do aparelho e tenta gravar o log sem travar a tela
                try {
                    const devInfo = await getDeviceInfo();
                    const { error: logError } = await _supabase.from('logs').insert({
                        nome_tesoureiro: usuarioLogado.nome,
                        tipo_acao: 'LOGIN',
                        ip_address: devInfo.ip,
                        device_id: devInfo.deviceId,
                        detalhes: 'Acesso realizado com sucesso. SO/Navegador: ' + devInfo.userAgent
                    });
                    
                    if(logError) {
                        console.error("Erro interno ao gravar log de acesso na tabela 'logs'. O acesso foi liberado mesmo assim.", logError);
                    }
                } catch(e) {
                    console.error("Erro na rotina de device info.", e);
                }

                verificarLogsLocais();
                setupFilters(); 
                carregarDados();
            }
        }

        async function carregarDados() {
            const { data: alunos } = await _supabase.from('alunos_cfo').select('*').order('id', { ascending: true });
            alunosDB = alunos || [];
            atualizarFinanceiro();
            renderAlunos();
            
            const { data: logsData } = await _supabase.from('logs_auditoria').select('*').order('created_at', { ascending: false }).limit(100);
            renderLogs(logsData || []);
        }

        function atualizarFinanceiro() {
            const calcularTotal = (lista) => lista.reduce((acc, a) => {
                let soma = 0;
                if(a.l1_pago) soma += (a.l1_qtd * 400);
                if(a.l2_pago) soma += (a.l2_qtd * 400);
                return acc + soma;
            }, 0);

            const totalGeral = calcularTotal(alunosDB);
            document.getElementById('total-geral').innerText = totalGeral.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            const filtrados = filtroAtivo === 'TODOS' ? alunosDB : alunosDB.filter(a => a.pelotao === filtroAtivo);
            const totalFiltro = calcularTotal(filtrados);
            document.getElementById('valor-filtro').innerText = totalFiltro.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('label-total-pelotao').innerText = `Exibindo: ${filtroAtivo.replace('/2ª CIA', '')}`;
        }

        function setupFilters() {
            const pells = ['TODOS', '1º PEL/2ª CIA', '2º PEL/2ª CIA', '3º PEL/2ª CIA', '4º PEL/2ª CIA', '5º PEL/2ª CIA', '6º PEL/2ª CIA'];
            document.getElementById('filter-container').innerHTML = pells.map(p => `
                <button onclick="setFiltro('${p}')" class="filter-btn bg-white border px-3 py-1 rounded text-xs hover:bg-gray-100 ${filtroAtivo === p ? 'filter-btn-active' : ''}">${p.replace('/2ª CIA', '')}</button>
            `).join('');
        }

        function setFiltro(p) { filtroAtivo = p; setupFilters(); renderAlunos(p); atualizarFinanceiro(); }

        function renderAlunos(filtro = filtroAtivo) {
            const body = document.getElementById('lista-alunos-body');
            body.innerHTML = '';
            const filtrados = filtro === 'TODOS' ? alunosDB : alunosDB.filter(a => a.pelotao === filtro);

            filtrados.forEach(aluno => {
                const podeEditar = (usuarioLogado.acesso === "TODOS" || usuarioLogado.acesso === aluno.pelotao);
                const total = (aluno.l1_pago ? aluno.l1_qtd * 400 : 0) + (aluno.l2_pago ? aluno.l2_qtd * 400 : 0);
                
                body.innerHTML += `
                    <tr class="border-b ${!podeEditar ? 'bg-gray-50 opacity-70' : 'hover:bg-blue-50'}">
                        <td class="p-4 font-bold text-sm">${aluno.id} - ${aluno.nome}<br><span class="text-[9px] text-gray-400 font-mono">${aluno.pelotao}</span></td>
                        <td class="p-4 text-center">
                            <select ${!podeEditar ? 'disabled' : ''} onchange="updateDB(${aluno.id}, 'l1_qtd', this.value)" class="text-xs border rounded p-1"><option value="0" ${aluno.l1_qtd==0?'selected':''}>0</option><option value="1" ${aluno.l1_qtd==1?'selected':''}>1</option><option value="2" ${aluno.l1_qtd==2?'selected':''}>2</option></select>
                            <label class="flex items-center justify-center mt-1 cursor-pointer"><input type="checkbox" ${aluno.l1_pago?'checked':''} ${!podeEditar?'disabled':''} onchange="updateDB(${aluno.id}, 'l1_pago', this.checked)" class="w-3 h-3 text-green-600"> <span class="text-[10px] ml-1 font-bold ${aluno.l1_pago ? 'text-green-600' : 'text-gray-400'}">PAGO</span></label>
                        </td>
                        <td class="p-4 text-center">
                            <select ${!podeEditar ? 'disabled' : ''} onchange="updateDB(${aluno.id}, 'l2_qtd', this.value)" class="text-xs border rounded p-1"><option value="0" ${aluno.l2_qtd==0?'selected':''}>0</option><option value="1" ${aluno.l2_qtd==1?'selected':''}>1</option></select>
                            <label class="flex items-center justify-center mt-1 cursor-pointer"><input type="checkbox" ${aluno.l2_pago?'checked':''} ${!podeEditar?'disabled':''} onchange="updateDB(${aluno.id}, 'l2_pago', this.checked)" class="w-3 h-3 text-green-600"> <span class="text-[10px] ml-1 font-bold ${aluno.l2_pago ? 'text-green-600' : 'text-gray-400'}">PAGO</span></label>
                        </td>
                        <td class="p-4 font-bold text-blue-800">R$ ${total}</td>
                        <td class="p-4 text-center"><span class="text-[9px] font-bold ${total>0?'text-green-600':'text-gray-300'}">${total>0?'PAGANTE':'N/A'}</span></td>
                    </tr>`;
            });
        }

        async function updateDB(id, campo, val) {
            const idx = alunosDB.findIndex(a => a.id === id);
            const antigo = alunosDB[idx][campo];
            const novo = (typeof val === 'boolean') ? val : parseInt(val);
            if(antigo === novo) return;

            alunosDB[idx][campo] = novo;
            atualizarFinanceiro();
            renderAlunos();

            const { error } = await _supabase.from('alunos_cfo').update({ [campo]: novo }).eq('id', id);
            if(!error) {
                const devInfo = await getDeviceInfo();
                const acao = typeof novo === 'boolean' ? (novo ? 'Marcou PAGO' : 'Marcou PENDENTE') : `Qtd para ${novo}`;
                
                await _supabase.from('logs_auditoria').insert({
                    autor: usuarioLogado.nome,
                    aluno: alunosDB[idx].nome,
                    detalhe: `${campo}: ${acao}`,
                    ip_address: devInfo.ip,
                    device_id: devInfo.deviceId,
                    user_agent: devInfo.userAgent
                });
                
                const { data: logsData } = await _supabase.from('logs_auditoria').select('*').order('created_at', { ascending: false }).limit(100);
                renderLogs(logsData || []);
            }
        }

        function renderLogs(logsData) {
            document.getElementById('logs-container').innerHTML = logsData.map(l => `
                <div class="text-[10px] p-2 border-l-2 border-blue-800 bg-white mb-1 flex gap-3">
                    <span class="text-gray-400 min-w-[120px]">${new Date(l.created_at).toLocaleString('pt-BR')}</span>
                    <span class="font-bold text-blue-900 w-24">${l.autor}</span>
                    <span>${l.aluno}: ${l.detalhe}</span>
                </div>`).join('');
        }

        function gerarRelatorio() {
            const filtrados = filtroAtivo === 'TODOS' ? alunosDB : alunosDB.filter(a => a.pelotao === filtroAtivo);
            document.getElementById('print-subtitle').innerText = `Relatório: ${filtroAtivo} - Gerado em ${new Date().toLocaleString('pt-BR')}`;
            
            const tbody = document.getElementById('print-tbody');
            tbody.innerHTML = filtrados.map(a => {
                const total = (a.l1_pago ? a.l1_qtd * 400 : 0) + (a.l2_pago ? a.l2_qtd * 400 : 0);
                return `<tr>
                    <td>${a.id} - ${a.nome}</td>
                    <td>${a.pelotao}</td>
                    <td>${a.l1_qtd} (${a.l1_pago?'PAGO':'PEND'})</td>
                    <td>${a.l2_qtd} (${a.l2_pago?'PAGO':'PEND'})</td>
                    <td>R$ ${total}</td>
                </tr>`;
            }).join('');
            
            window.print();
        }

        function verificarLogsLocais() {
            const logsLocais = JSON.parse(localStorage.getItem('comasp_v4_logs')) || JSON.parse(localStorage.getItem('comasp_t2_logs')) || [];
            if(logsLocais.length > 0) document.getElementById('sync-banner').classList.remove('hidden');
        }

        async function migrarLogsLocais() {
            const keys = ['comasp_v4_logs', 'comasp_t2_logs', 'comasp_secure_logs', 'comasp_v3_logs'];
            let todosLogs = [];
            keys.forEach(k => {
                const l = JSON.parse(localStorage.getItem(k));
                if(l) todosLogs = [...todosLogs, ...l];
            });

            if(todosLogs.length > 0) {
                alert(`Sincronizando ${todosLogs.length} logs antigos... isso pode levar uns segundos.`);
                for(const l of todosLogs) {
                    await _supabase.from('logs_auditoria').insert({
                        created_at: new Date(l.data || new Date()).toISOString(),
                        autor: l.autor || l.usuario || "Sistema Antigo",
                        aluno: l.aluno || "Desconhecido",
                        detalhe: l.detalhe || "Log recuperado"
                    });
                }
                keys.forEach(k => localStorage.removeItem(k));
                alert("Logs migrados com sucesso!");
                carregarDados();
                document.getElementById('sync-banner').classList.add('hidden');
            }
        }

        function showTab(tab) {
            document.getElementById('tab-painel').classList.toggle('hidden', tab !== 'painel');
            document.getElementById('tab-logs').classList.toggle('hidden', tab !== 'logs');
            document.getElementById('btn-tab-painel').classList.toggle('tab-active', tab === 'painel');
            document.getElementById('btn-tab-logs').classList.toggle('tab-active', tab === 'logs');
        }

        function handleLogout() { location.reload(); }
    </script>
</body>
</html>
