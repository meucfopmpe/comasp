<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMASP T2 - Sistema Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tab-active { border-bottom: 3px solid #1e40af; color: #1e40af; font-weight: bold; }
        .hidden { display: none; }
        .filter-btn-active { background-color: #1e40af !important; color: white !important; }
        input:disabled, select:disabled { background-color: #f3f4f6; cursor: not-allowed; opacity: 0.7; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-slate-900 px-4">
        <div class="bg-white p-8 rounded-lg shadow-2xl w-full max-w-md">
            <h1 class="text-2xl font-bold mb-6 text-center text-slate-800 tracking-tight">COMASP <span class="text-blue-600 font-black">T2</span></h1>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500">CPF (Login)</label>
                    <input type="text" id="login-cpf" class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Apenas números">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500">Senha Pessoal</label>
                    <input type="password" id="login-pass" class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="******">
                </div>
                <button onclick="handleLogin()" id="btn-entrar" class="w-full bg-blue-700 text-white py-2 rounded font-bold hover:bg-blue-800 transition">Entrar com Segurança</button>
            </div>
            <p id="login-error" class="text-red-500 text-xs mt-4 text-center hidden font-semibold"></p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="bg-white shadow-sm p-4 flex flex-col md:flex-row justify-between items-center border-b-2 border-blue-800 gap-4">
            <h2 class="text-xl font-bold text-slate-800 uppercase tracking-tighter">Sistema de Senhas <span class="text-blue-600">T2</span></h2>
            <div class="flex items-center gap-4 border-l pl-4">
                <div class="text-right">
                    <span id="user-display" class="block text-sm font-bold text-slate-700">Carregando...</span>
                    <span id="user-role" class="block text-[10px] text-blue-600 uppercase font-black tracking-widest"></span>
                </div>
                <button onclick="handleLogout()" class="text-xs bg-red-50 text-red-600 px-3 py-1 rounded font-bold hover:bg-red-100">Sair</button>
            </div>
        </header>

        <nav class="flex bg-white shadow-sm px-4 sticky top-0 z-10 border-b">
            <button onclick="showTab('painel')" id="btn-tab-painel" class="p-4 tab-active transition">Painel de Alunos</button>
            <button onclick="showTab('logs')" id="btn-tab-logs" class="p-4 transition">Linha do Tempo (Logs)</button>
        </nav>

        <main class="p-4 md:p-6">
            <div id="tab-painel">
                <div class="mb-6 flex flex-wrap gap-2">
                    <button onclick="filterPelotao('TODOS')" class="filter-btn filter-btn-active bg-white border px-3 py-1 rounded-md text-xs shadow-sm">Todos</button>
                    <button onclick="filterPelotao('1º PEL/2ª CIA')" class="filter-btn bg-white border px-3 py-1 rounded-md text-xs shadow-sm">1º Pel</button>
                    <button onclick="filterPelotao('2º PEL/2ª CIA')" class="filter-btn bg-white border px-3 py-1 rounded-md text-xs shadow-sm">2º Pel</button>
                    <button onclick="filterPelotao('3º PEL/2ª CIA')" class="filter-btn bg-white border px-3 py-1 rounded-md text-xs shadow-sm">3º Pel</button>
                    <button onclick="filterPelotao('4º PEL/2ª CIA')" class="filter-btn bg-white border px-3 py-1 rounded-md text-xs shadow-sm">4º Pel</button>
                    <button onclick="filterPelotao('5º PEL/2ª CIA')" class="filter-btn bg-white border px-3 py-1 rounded-md text-xs shadow-sm">5º Pel</button>
                    <button onclick="filterPelotao('6º PEL/2ª CIA')" class="filter-btn bg-white border px-3 py-1 rounded-md text-xs shadow-sm">6º Pel</button>
                </div>

                <div class="bg-white rounded-lg shadow overflow-x-auto border border-gray-200">
                    <table class="w-full text-left border-collapse min-w-[900px]">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-4 text-[11px] font-bold uppercase text-gray-500">Nº / Nome</th>
                                <th class="p-4 text-[11px] font-bold uppercase text-gray-500 text-center">Lote 1 (Max 2)</th>
                                <th class="p-4 text-[11px] font-bold uppercase text-gray-500 text-center">Lote 2 (Max 1)</th>
                                <th class="p-4 text-[11px] font-bold uppercase text-gray-500">Total (R$)</th>
                                <th class="p-4 text-[11px] font-bold uppercase text-gray-500 text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody id="lista-alunos-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-logs" class="hidden">
                <div class="bg-white rounded-lg shadow p-4 max-w-5xl mx-auto border border-gray-200">
                    <div class="space-y-1 max-h-[600px] overflow-y-auto pr-2" id="logs-container"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- CONFIGURAÇÃO SUPABASE (Preencher com seus dados) ---
        const SUPABASE_URL = https://iogtissohqhgxiskzgvc.supabase.co;
        const SUPABASE_KEY = eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvZ3Rpc3NvaHFoZ3hpc2t6Z3ZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI1MDAwNTEsImV4cCI6MjA3ODA3NjA1MX0.4Fj05iwaUNDpdDaAch-dGp5TUtcumV72uzpIovQeCbg;
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- DADOS DOS ALUNOS (Mantidos conforme pedido) ---
        const ALUNOS_T2 = [
            { id: 1, nome: "MÁRCIO SOUZA", pelotao: "1º PEL/2ª CIA" },
            { id: 2, nome: "RENATO", pelotao: "2º PEL/2ª CIA" },
            // ... (A lista completa de 197 deve estar aqui)
            { id: 197, nome: "ISRAEL OLIVEIRA", pelotao: "4º PEL/2ª CIA" }
        ];

        let usuarioLogado = null;
        let dadosAlunos = JSON.parse(localStorage.getItem('comasp_secure_alunos')) || ALUNOS_T2.map(a => ({
            ...a, l1_qtd: 0, l1_pago: false, l2_qtd: 0, l2_pago: false
        }));
        let logs = JSON.parse(localStorage.getItem('comasp_secure_logs')) || [];

        // --- LÓGICA DE LOGIN SEGURA ---
        async function handleLogin() {
            const btn = document.getElementById('btn-entrar');
            const errorEl = document.getElementById('login-error');
            const cpf = document.getElementById('login-cpf').value.replace(/\D/g, "");
            const pass = document.getElementById('login-pass').value;

            btn.disabled = true;
            btn.innerText = "Verificando...";

            // O Supabase Auth verifica a senha no SERVIDOR. Nada fica no front-end.
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: `${cpf}@comasp.com`,
                password: pass
            });

            if (error) {
                errorEl.innerText = "CPF ou Senha incorretos.";
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "Entrar com Segurança";
            } else {
                // Busca o perfil do usuário (Metadata) para saber o acesso
                const { data: perfil } = await _supabase.from('perfis_tesoureiros').select('*').eq('id', data.user.id).single();
                usuarioLogado = perfil;
                
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = usuarioLogado.nome;
                document.getElementById('user-role').innerText = usuarioLogado.cargo;
                renderAlunos();
                renderLogs();
            }
        }

        function handleLogout() { _supabase.auth.signOut(); location.reload(); }

        // --- RENDERIZAÇÃO E FILTROS ---
        function showTab(tab) {
            document.getElementById('tab-painel').classList.toggle('hidden', tab !== 'painel');
            document.getElementById('tab-logs').classList.toggle('hidden', tab !== 'logs');
            document.getElementById('btn-tab-painel').classList.toggle('tab-active', tab === 'painel');
            document.getElementById('btn-tab-logs').classList.toggle('tab-active', tab === 'logs');
        }

        function filterPelotao(pel) {
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(b => b.classList.remove('filter-btn-active'));
            event.target.classList.add('filter-btn-active');
            renderAlunos(pel);
        }

        function renderAlunos(filtro = 'TODOS') {
            const body = document.getElementById('lista-alunos-body');
            body.innerHTML = '';
            const filtrados = filtro === 'TODOS' ? dadosAlunos : dadosAlunos.filter(a => a.pelotao === filtro);

            filtrados.forEach(aluno => {
                const podeEditar = (usuarioLogado.acesso === "TODOS" || usuarioLogado.acesso === aluno.pelotao);
                const total = (aluno.l1_qtd + aluno.l2_qtd) * 400;
                
                const row = document.createElement('tr');
                row.className = `border-b transition-colors ${!podeEditar ? 'bg-gray-50' : 'hover:bg-blue-50'}`;
                row.innerHTML = `
                    <td class="p-4"><div class="font-bold text-sm">${aluno.id} - ${aluno.nome} ${!podeEditar ? '🔒' : ''}</div><div class="text-[9px] text-gray-400 font-mono">${aluno.pelotao}</div></td>
                    <td class="p-4 text-center">
                        <select ${!podeEditar ? 'disabled' : ''} onchange="updateData(${aluno.id}, 'l1_qtd', this.value)" class="text-xs border rounded p-1">
                            <option value="0" ${aluno.l1_qtd == 0 ? 'selected' : ''}>0</option><option value="1" ${aluno.l1_qtd == 1 ? 'selected' : ''}>1</option><option value="2" ${aluno.l1_qtd == 2 ? 'selected' : ''}>2</option>
                        </select>
                        <button ${!podeEditar ? 'disabled' : ''} onclick="updateData(${aluno.id}, 'l1_pago', ${!aluno.l1_pago})" 
                            class="block mx-auto mt-1 text-[8px] px-2 py-0.5 rounded-full font-bold border ${aluno.l1_pago ? 'bg-green-600 text-white' : 'bg-white text-orange-500 border-orange-500'}">
                            ${aluno.l1_pago ? 'PAGO' : 'PENDENTE'}
                        </button>
                    </td>
                    <td class="p-4 text-center">
                        <select ${!podeEditar ? 'disabled' : ''} onchange="updateData(${aluno.id}, 'l2_qtd', this.value)" class="text-xs border rounded p-1">
                            <option value="0" ${aluno.l2_qtd == 0 ? 'selected' : ''}>0</option><option value="1" ${aluno.l2_qtd == 1 ? 'selected' : ''}>1</option>
                        </select>
                        <button ${!podeEditar ? 'disabled' : ''} onclick="updateData(${aluno.id}, 'l2_pago', ${!aluno.l2_pago})" 
                            class="block mx-auto mt-1 text-[8px] px-2 py-0.5 rounded-full font-bold border ${aluno.l2_pago ? 'bg-green-600 text-white' : 'bg-white text-orange-500 border-orange-500'}">
                            ${aluno.l2_pago ? 'PAGO' : 'PENDENTE'}
                        </button>
                    </td>
                    <td class="p-4 font-bold text-slate-700">R$ ${total}</td>
                    <td class="p-4 text-center font-bold text-[10px] ${aluno.l1_pago && (aluno.l2_qtd == 0 || aluno.l2_pago) ? 'text-green-600' : 'text-gray-300'}">
                        ${aluno.l1_pago && (aluno.l2_qtd == 0 || aluno.l2_pago) ? '✓ QUITADO' : '◌ ABERTO'}
                    </td>
                `;
                body.appendChild(row);
            });
        }

        function updateData(alunoId, campo, valor) {
            const idx = dadosAlunos.findIndex(a => a.id === alunoId);
            const antigo = dadosAlunos[idx][campo];
            const novoValor = (campo.includes('qtd')) ? parseInt(valor) : valor;
            if (antigo === novoValor) return;

            dadosAlunos[idx][campo] = novoValor;
            logs.push({ data: new Date().toLocaleString('pt-BR'), autor: usuarioLogado.nome, aluno: dadosAlunos[idx].nome, detalhe: `${campo}: ${antigo} -> ${novoValor}` });

            localStorage.setItem('comasp_secure_alunos', JSON.stringify(dadosAlunos));
            localStorage.setItem('comasp_secure_logs', JSON.stringify(logs));
            renderAlunos(); renderLogs();
        }

        function renderLogs() {
            const container = document.getElementById('logs-container');
            container.innerHTML = logs.length === 0 ? '<p class="text-gray-400">Sem registros.</p>' : '';
            logs.slice().reverse().forEach(log => {
                const item = document.createElement('div');
                item.className = "text-[10px] p-2 border-l-2 border-blue-800 bg-white mb-1 shadow-sm flex gap-3";
                item.innerHTML = `<span class="text-gray-400 font-mono">${log.data}</span> <span class="font-bold text-blue-900 w-24">${log.autor}</span> <span>${log.aluno}: ${log.detalhe}</span>`;
                container.appendChild(item);
            });
        }
    </script>
</body>
</html>
